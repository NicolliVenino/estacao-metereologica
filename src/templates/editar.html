{% extends 'base.html' %}

{% block content %}
<h2>Editar Leitura #{{ leitura.id }}</h2>
<div class="card mt-3" style="max-width: 500px;">
    <div class="card-body">
        <form id="formEditar" onsubmit="atualizarLeitura(event, {{ leitura.id }})">
            <div class="mb-3">
                <label>Temperatura (°C)</label>
                <input type="number" step="0.01" class="form-control" id="temp" value="{{ leitura.temperatura }}" required>
            </div>
            <div class="mb-3">
                <label>Umidade (%)</label>
                <input type="number" step="0.01" class="form-control" id="umid" value="{{ leitura.umidade }}" required>
            </div>
            <div class="mb-3">
                <label>Pressão (hPa)</label>
                <input type="number" step="0.01" class="form-control" id="press" value="{{ leitura.pressao or '' }}">
            </div>
            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            <a href="/historico" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
